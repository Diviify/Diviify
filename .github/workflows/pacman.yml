name: Generate Pacman Contribution Graph

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Pacman Graph
        uses: Platane/snk@v3
        with:
          github_user_name: Diviify
          outputs: |
            dist/pacman.svg?palette=github-dark&color_snake=#FFD700&color_dots=#00FFAA,#00CC88,#009966,#006644,#003322

      - name: Deploy to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
